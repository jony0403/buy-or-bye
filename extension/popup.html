<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>매물 전송</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Pretendard, system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 12px;
        width: 320px;
        max-height: 520px;
        font-size: 13px;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        background: #eef1f6;
        color: #5c6470;
        margin-bottom: 4px;
      }
      .title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
        word-break: break-word;
      }
      .price {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
      }
      .comps-line {
        margin: 0;
        font-size: 11px;
        color: #5c6470;
        padding: 6px 8px;
        background: #f6f7f9;
        border-radius: 6px;
      }
      .comps-line strong {
        color: #1a1a1a;
      }
      .body-wrap {
        overflow: auto;
        background: #f6f7f9;
        border-radius: 8px;
        padding: 8px 10px;
        max-height: 160px;
      }
      .body-label,
      .img-label {
        margin: 0 0 4px;
        font-size: 10px;
        font-weight: 700;
        color: #8f96a3;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #bodyText {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #bodyText.empty {
        color: #8f96a3;
      }
      #imgGrid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }
      #imgGrid img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #e5e8ed;
      }
      #imgGrid.empty {
        display: block;
        font-size: 11px;
        color: #8f96a3;
      }
      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-primary {
        background: #1a1a1a;
        color: #fff;
      }
      .btn-secondary {
        background: #eef1f6;
        color: #1a1a1a;
        font-size: 12px;
        padding: 8px;
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .hint {
        margin: 0;
        font-size: 10px;
        color: #8f96a3;
        line-height: 1.4;
        text-align: center;
      }
      #status {
        min-height: 1em;
        font-size: 11px;
        color: #3b6cff;
        text-align: center;
      }
      #status.err {
        color: #c62828;
      }
      #status.ok {
        color: #2e7d32;
        font-weight: 700;
      }
      .search-only {
        display: none;
        text-align: center;
        gap: 8px;
      }
      .detail-only.hidden,
      .search-only.hidden {
        display: none !important;
      }
      .detail-only:not(.hidden) {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .search-only:not(.hidden) {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="detail-only hidden" id="detailPanel">
      <div id="preview">
        <span class="badge" id="platform">—</span>
        <h1 class="title" id="title">불러오는 중…</h1>
        <p class="price" id="price"></p>
        <p class="comps-line" id="compsLine">비교 매물 — 번개 · 당근</p>
        <p class="img-label">사진</p>
        <div id="imgGrid" class="empty">없음</div>
        <div class="body-wrap">
          <p class="body-label">본문</p>
          <p id="bodyText" class="empty"></p>
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="sendWeb" disabled>분석 웹으로 보내기</button>
      <button type="button" class="btn btn-secondary" id="openSearch">유사 매물 검색 · 자동 수집</button>
      <p class="hint">검색 탭이 열리면 잠시 후 번개·당근이 자동 수집됩니다</p>
    </div>

    <div class="search-only hidden" id="searchPanel">
      <span class="badge" id="searchPlatform">검색</span>
      <h1 class="title" id="searchTitle">검색 결과</h1>
      <p class="hint" id="searchHint">이 페이지에 보이는 매물을 수집합니다</p>
      <button type="button" class="btn btn-primary" id="collectSearch">이 페이지 수집하기</button>
    </div>

    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
